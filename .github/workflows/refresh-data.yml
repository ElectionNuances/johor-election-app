name: Refresh election data

on:
  schedule:
    - cron: "17 3 3 * *"   # monthly, 3rd day 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh CSV (hash-compare)
        id: refresh
        run: python scripts/refresh_data.py
      - name: Sanity gate
        if: steps.refresh.outputs.changed == 'true'
        run: python scripts/sanity_check.py
      - name: Commit if changed
        if: steps.refresh.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ballots_jhr.csv data/meta.json
          git commit -m "data: refresh ballots_jhr.csv ($(date -u +%F))"
          git push
